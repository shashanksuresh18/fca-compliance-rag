# ============================================================
# FCA Compliance RAG — CI Pipeline (Fixed)
# ============================================================

name: FCA RAG CI — Unit Tests + Faithfulness Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ----------------------------------------------------------------
  # Job 1: Unit tests — fast, no API keys, no heavy model downloads
  # Uses requirements-ci.txt (no torch, ~100MB total vs ~700MB full)
  # ----------------------------------------------------------------
  unit-tests:
    name: Unit Tests (Phase 1 + Phase 2)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lightweight CI dependencies (no torch)
        run: pip install -r requirements-ci.txt

      - name: Create .env with dummy Groq key for config validation
        run: |
          echo "GROQ_API_KEY=gsk_dummy_ci_key_not_real" > .env
          echo "USE_HYBRID=true" >> .env
          echo "USE_RERANKER=true" >> .env
          echo "PROMPT_VERSION=v2" >> .env
          echo "EMBEDDING_MODEL=all-MiniLM-L6-v2" >> .env

      - name: Run Phase 1 unit tests
        run: python -m pytest tests/test_pipeline.py -v --tb=short

      - name: Run Phase 2 retrieval unit tests
        run: python -m pytest tests/test_phase2_retrieval.py -v --tb=short

  # ----------------------------------------------------------------
  # Job 2: RAGAS Faithfulness Gate
  # Full install (with torch), real Groq key, runs on main only
  # ----------------------------------------------------------------
  faithfulness-gate:
    name: RAGAS Faithfulness Gate (>= 0.85)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install full dependencies (includes torch + sentence-transformers)
        run: pip install -r requirements.txt

      - name: Create .env with real Groq API key
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "GROQ_API_KEY=$GROQ_API_KEY" > .env
          echo "USE_HYBRID=true" >> .env
          echo "USE_RERANKER=true" >> .env
          echo "PROMPT_VERSION=v2" >> .env
          echo "EMBEDDING_MODEL=all-MiniLM-L6-v2" >> .env

      - name: Ingest mock FCA documents into ChromaDB
        run: python src/ingest.py --dir data/mock --doc-type internal

      - name: Run RAGAS evaluation (faithfulness gate = 0.85)
        run: |
          python eval/evaluate.py \
            --dataset eval/golden_dataset.json \
            --output eval/results.json \
            --threshold 0.85

      - name: Upload eval results as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval/results.json
          retention-days: 30

      - name: Post evaluation scores to job summary
        if: always()
        run: |
          python -c "
          import json, sys
          try:
              with open('eval/results.json') as f:
                  r = json.load(f)
              m = r['metrics']
              gate = r['ci_gate']
              print('## FCA RAG Evaluation Results')
              print('| Metric | Score |')
              print('|--------|-------|')
              faith = m.get('faithfulness')
              rel = m.get('answer_relevancy')
              print(f'| Faithfulness | {faith:.3f} |' if faith else '| Faithfulness | N/A |')
              print(f'| Answer Relevancy | {rel:.3f} |' if rel else '| Answer Relevancy | N/A |')
              print(f'| Citation Coverage | {m.get(\"citation_coverage\", \"N/A\")} |')
              print(f'| Decline Accuracy | {m.get(\"decline_accuracy\", \"N/A\")} |')
              print(f'| Avg Latency | {m.get(\"avg_latency_s\", \"N/A\")}s |')
              print(f'| **CI Gate** | {\"PASSED\" if gate[\"passed\"] else \"FAILED\"} |')
          except Exception as e:
              print(f'Could not read results: {e}')
          " >> $GITHUB_STEP_SUMMARY
