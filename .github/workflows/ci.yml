# ============================================================
# FCA Compliance RAG — CI Pipeline
# GitHub Actions workflow
# ============================================================
#
# WHAT THIS DOES:
# ━━━━━━━━━━━━━━
# On every push to main and every pull request:
#   1. Install dependencies
#   2. Run unit tests (Phase 1 + Phase 2) — these never call live APIs
#   3. Run RAGAS evaluation against golden dataset
#      → If faithfulness < 0.85, the build FAILS (exit code 1)
#   4. Upload eval results as a build artifact for review
#
# WHY THIS MATTERS FOR BANKING:
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# In a regulated environment, LLM regressions are invisible without
# automated eval. A prompt change that drops faithfulness from 0.92 to
# 0.78 would silently reach production. This CI gate catches it.
#
# SECRETS REQUIRED (GitHub → Settings → Secrets):
#   GROQ_API_KEY — your Groq API key
# ============================================================

name: FCA RAG CI — Unit Tests + Faithfulness Gate

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    PYTHON_VERSION: "3.11"

jobs:
    # ----------------------------------------------------------------
    # Job 1: Unit tests (fast, no API keys needed)
    # ----------------------------------------------------------------
    unit-tests:
        name: Unit Tests (Phase 1 + Phase 2)
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Create minimal .env for unit tests
              run: |
                  echo "GROQ_API_KEY=dummy_for_unit_tests" >> .env
                  echo "USE_HYBRID=true" >> .env
                  echo "USE_RERANKER=true" >> .env
                  echo "PROMPT_VERSION=v2" >> .env

            - name: Run Phase 1 unit tests
              run: python -m pytest tests/test_pipeline.py -v --tb=short

            - name: Run Phase 2 retrieval unit tests
              run: python -m pytest tests/test_phase2_retrieval.py -v --tb=short

    # ----------------------------------------------------------------
    # Job 2: RAGAS Faithfulness Gate (requires Groq API key)
    # Runs on push to main only (not on PRs to avoid key exposure)
    # ----------------------------------------------------------------
    faithfulness-gate:
        name: RAGAS Faithfulness Gate (>= 0.85)
        runs-on: ubuntu-latest
        needs: unit-tests # Only run if unit tests pass
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python ${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
                  cache: pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Create .env with Groq API key
              env:
                  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
              run: |
                  echo "GROQ_API_KEY=$GROQ_API_KEY" >> .env
                  echo "USE_HYBRID=true" >> .env
                  echo "USE_RERANKER=true" >> .env
                  echo "PROMPT_VERSION=v2" >> .env

            - name: Ingest mock FCA documents
              run: python src/ingest.py --dir data/mock --doc-type internal

            - name: Run RAGAS evaluation (faithfulness gate = 0.85)
              run: |
                  python eval/evaluate.py \
                    --dataset eval/golden_dataset.json \
                    --output eval/results.json \
                    --threshold 0.85
              # This step exits with code 1 if faithfulness < 0.85
              # GitHub Actions will mark the build as FAILED

            - name: Upload eval results as build artifact
              if: always() # Upload even if the gate fails, for debugging
              uses: actions/upload-artifact@v4
              with:
                  name: eval-results-${{ github.sha }}
                  path: eval/results.json
                  retention-days: 30

            - name: Post faithfulness score to job summary
              if: always()
              run: |
                  python -c "
                  import json
                  with open('eval/results.json') as f:
                      r = json.load(f)
                  m = r['metrics']
                  faith = m.get('faithfulness', 'N/A')
                  rel = m.get('answer_relevancy', 'N/A')
                  cit = m.get('citation_coverage', 'N/A')
                  dec = m.get('decline_accuracy', 'N/A')
                  gate = r['ci_gate']
                  print(f'## FCA RAG Eval Results')
                  print(f'| Metric | Score |')
                  print(f'|--------|-------|')
                  print(f'| Faithfulness | {faith} |')
                  print(f'| Answer Relevancy | {rel} |')
                  print(f'| Citation Coverage | {cit} |')
                  print(f'| Decline Accuracy | {dec} |')
                  print(f'| CI Gate | {\"PASSED\" if gate[\"passed\"] else \"FAILED\"} |')
                  " >> $GITHUB_STEP_SUMMARY
